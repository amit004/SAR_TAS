quarkus.http.port=8080
# Pin IDE for dev console [x]; auto can NPE when no/multiple IDEs are detected
quarkus.ide.target=vscode
llm.provider=ollama
llm.api.url=http://127.0.0.1:11434/v1/chat/completions
llm.api.model=gemma3:4b
llm.api.key=not-required-for-ollama
llm.api.connect-timeout.seconds=10
# Per-request HTTP timeout (resume/JD match sends a large prompt; local CPU models often need 3–10+ min)
llm.api.request-timeout.seconds=600
# Cap completion size (lower = faster; raise if JSON is cut off)
llm.api.max-tokens=3072
llm.api.temperature=0.25
# JD parse: max chars per JD / requirement field
llm.prompt.max-chars=12000
# /api/match/score only — smaller = faster (tokens to read + generate)
llm.match.max-chars-per-doc=5000
llm.match.max-tokens=896

